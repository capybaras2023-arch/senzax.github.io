<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Senza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <div class="gradient-bg"></div>
        <div class="animated-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
            <div class="shape shape-4"></div>
            <div class="shape shape-5"></div>
        </div>
        
    </div>

    <main class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title">SENZA</h1>
            <p class="hero-subtitle">Элитная семья нового поколения</p>
            
            <div class="buttons-container">
                <a href="#" class="main-button button-left" id="openModal">
                    <span class="button-text">Подать заявку</span>
                </a>
                <a href="https://discord.gg/z9PEnpnU" class="main-button button-right discord-button" target="_blank">
                    <span class="button-text">Discord</span>
                </a>
            </div>
        </div>
    </main>

    <div class="modal" id="applicationModal">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-container">
            <button class="modal-close" id="closeModal">×</button>
            <div class="modal-header">
                <h2 class="modal-title">Заявка в SENZA</h2>
                <p class="modal-subtitle">Заполните все поля для рассмотрения</p>
            </div>
            <form class="application-form" id="applicationForm">
                <div class="form-step active" data-step="1">
                    <div class="form-group">
                        <label class="form-label">
                            <span class="label-number">01</span>
                            Возраст
                        </label>
                        <input type="number" class="form-input" name="age" placeholder="Введите ваш возраст" required min="14" max="99">
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <span class="label-number">02</span>
                            Скриншот персонажей
                        </label>
                        <div class="file-upload">
                            <input type="file" id="screenshot" name="screenshot" accept="image/*" required>
                            <label for="screenshot" class="file-label">
                                <span class="file-icon">📁</span>
                                <span class="file-text">Выберите файл</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-step" data-step="2">
                    <div class="form-group">
                        <label class="form-label">
                            <span class="label-number">03</span>
                            В каких семьях были и почему ушли
                        </label>
                        <textarea class="form-textarea" name="families" rows="5" placeholder="Расскажите о вашем опыте в других семьях..." required></textarea>
                    </div>
                </div>

                <div class="form-step" data-step="3">
                    <div class="form-group">
                        <label class="form-label">
                            <span class="label-number">04</span>
                            На каких серверах есть стартер пак?
                        </label>
                        <textarea class="form-textarea" name="servers" rows="4" placeholder="Укажите сервера и наличие стартер паков..." required></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">
                            <span class="label-number">05</span>
                            Откат с каптов / MCL / GunGame
                        </label>
                        <textarea class="form-textarea" name="rollback" rows="4" placeholder="Опишите ваш опыт и откаты..." required></textarea>
                    </div>
                </div>

                <div class="form-navigation">
                    <button type="button" class="form-btn form-btn-prev" id="prevBtn" style="display: none;">
                        <span>← Назад</span>
                    </button>
                    <div class="form-progress">
                        <span class="progress-current">1</span> / <span class="progress-total">3</span>
                    </div>
                    <button type="button" class="form-btn form-btn-next" id="nextBtn">
                        <span>Далее →</span>
                    </button>
                    <button type="submit" class="form-btn form-btn-submit" id="submitBtn" style="display: none;">
                        <span>Отправить заявку</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="success-popup" id="successPopup">
        <div class="success-content">
            <div class="success-icon">✓</div>
            <h3>Заявка отправлена!</h3>
            <p>Мы рассмотрим вашу заявку в ближайшее время</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
